<!DOCTYPE html>
<title>404 — Page Not Found</title>
<meta charset=utf-8>
<meta http-equiv=X-UA-Compatible content="IE=edge">
<meta name=viewport content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1">
<style>
html {
  font-family: Verdana, Geneva, sans-serif;
  color: #979797;
}
.error-container {
  position: absolute;
  top: 0px;
  right: 0px;
  bottom: 0px;
  left: 0px;
}

.error-content {
  display: table;
  margin: 0 auto;
  height: 100%;
}

.error-details {
  display: table-cell;
  vertical-align: middle;
}

.error-image {
  vertical-align: middle;
}

.error-message {
  display: inline-block;
  margin-left: 10px;
  vertical-align: middle;
}

.error-code {
  margin: 0;
  font-size: 7.8em;
  line-height: 0.9em;
}

.error-description {
  margin: 0;
  font-weight: 400;
  font-size: 1.9em;
}
</style>
<link href=/theme/images/favicon.ico rel=icon type=image/x-icon>
<div class=error-container>
  <section class=error-content>
    <section class=error-details>
      <img class=error-image src=https://i.imgur.com/AeIosyg.png alt="404 error">
      <section class=error-message>
        <h1 class=error-code>404</h1>
        <h2 class=error-description>Page Not Found</h2>
        <a href=/>Go to home page →</a>
      </section>
    </section>
  </section>
</div>
